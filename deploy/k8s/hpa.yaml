apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: llmtrace-backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: llmtrace-backend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: llmtrace-worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: llmtrace-worker
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
