apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: llmtrace
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
spec:
  tls:
    - hosts:
        - llmtrace.example.com
      secretName: llmtrace-tls
  rules:
    - host: llmtrace.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: llmtrace-backend
                port:
                  number: 8000
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: llmtrace-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: llmtrace-frontend
                port:
                  number: 80
