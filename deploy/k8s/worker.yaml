apiVersion: apps/v1
kind: Deployment
metadata:
  name: llmtrace-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llmtrace-worker
  template:
    metadata:
      labels:
        app: llmtrace-worker
    spec:
      containers:
        - name: worker
          image: llmtrace-backend:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "app.ingestion.worker"]
          envFrom:
            - configMapRef:
                name: llmtrace-config
            - secretRef:
                name: llmtrace-secrets
          env:
            - name: SDK_INGESTION_URL
              value: ""
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
